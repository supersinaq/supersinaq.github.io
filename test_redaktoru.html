<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Sualları Redaktoru</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 820px; margin: 0 auto; padding: 2rem 1rem; }
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #666; }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 1rem;
    flex-wrap: wrap; align-items: center;
    background: #fff; border: 1px solid #e0e0d8;
    border-radius: 10px; padding: 12px 16px;
  }
  .toolbar input[type=file] { display: none; }
  .toolbar label, .toolbar button {
    font-size: 13px; padding: 7px 14px; border-radius: 8px;
    border: 1px solid #ccc; background: #f5f5f0;
    color: #333; cursor: pointer; font-family: Arial, sans-serif;
  }
  .toolbar label:hover, .toolbar button:hover { background: #e8e8e3; }
  #stats {
    font-size: 13px; color: #888; margin-left: auto;
    font-weight: 500;
  }

  .notice {
    font-size: 13px; color: #555; padding: 10px 14px;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; margin-bottom: 1rem;
  }

  .question-list { display: flex; flex-direction: column; gap: 8px; }

  .q-card {
    background: #fff;
    border: 1px solid #e0e0d8;
    border-radius: 10px;
    padding: 13px 16px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .q-card.removed {
    background: #f9f9f7;
    opacity: 0.45;
  }
  .q-card .num {
    font-size: 12px; font-weight: 600; color: #999;
    min-width: 30px; margin-top: 2px;
  }
  .q-card .body { flex: 1; }
  .q-card .qtext {
    font-size: 14px; color: #1a1a1a; margin-bottom: 8px; line-height: 1.55;
  }
  .opts { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
  .opt-badge {
    font-size: 12px; padding: 3px 9px;
    border-radius: 6px;
    border: 1px solid #ddd;
    color: #555;
    background: #f5f5f0;
  }
  .opt-badge.correct {
    background: #eaf3de; color: #3b6d11; border-color: #97c459; font-weight: 600;
  }
  .ans-label { font-size: 12px; color: #888; }
  .ans-label b { color: #3b6d11; }

  .remove-btn {
    font-size: 12px; padding: 5px 12px; border-radius: 7px;
    border: 1px solid #ccc; background: transparent;
    color: #666; cursor: pointer; white-space: nowrap;
    font-family: Arial, sans-serif;
  }
  .remove-btn:hover { background: #fcebeb; color: #a32d2d; border-color: #f09595; }
  .remove-btn.restore:hover { background: #f0f0ea; color: #333; border-color: #ccc; }

  .empty {
    text-align: center; padding: 4rem 1rem;
    color: #999; font-size: 14px;
    background: #fff; border: 1px solid #e0e0d8; border-radius: 10px;
  }

  .export-bar {
    margin-top: 1.5rem; padding: 14px 16px;
    border: 1px solid #e0e0d8; border-radius: 10px;
    background: #fff;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .export-bar span { font-size: 13px; color: #777; flex: 1; }
  .btn-export {
    font-size: 13px; padding: 8px 18px; border-radius: 8px;
    border: none; background: #1a1a1a;
    color: #fff; cursor: pointer; font-weight: 600;
    font-family: Arial, sans-serif;
  }
  .btn-export:hover { background: #333; }

  .paste-area {
    display: none; margin-bottom: 1rem;
  }
  .paste-area textarea {
    width: 100%; height: 140px; padding: 10px;
    font-size: 13px; border: 1px solid #ccc; border-radius: 8px;
    font-family: monospace; resize: vertical; color: #222;
  }
  .paste-area .paste-btns { display: flex; gap: 8px; margin-top: 8px; }
  .paste-area button {
    font-size: 13px; padding: 7px 14px; border-radius: 8px;
    border: 1px solid #ccc; background: #f5f5f0;
    cursor: pointer; font-family: Arial, sans-serif;
  }
  .paste-area .btn-ok { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Test Sualları Redaktoru</h1>
    <p>Sualları yükləyin, lazımsızları silin, sonra TXT formatında ixrac edin</p>
  </div>

  <div class="toolbar">
    <label for="file-input">📂 TXT faylı yüklə</label>
    <input type="file" id="file-input" accept=".txt,.js">
    <button id="paste-btn">📋 Mətn yapışdır</button>
    <button id="demo-btn">🧪 Nümunəni yüklə</button>
    <button id="remove-all-btn" style="display:none">❌ Hamısını sil</button>
    <button id="restore-all-btn" style="display:none">♻️ Hamısını bərpa et</button>
    <span id="stats"></span>
  </div>

  <div class="paste-area" id="paste-area">
    <textarea id="paste-input" placeholder="Buraya sual mətnini yapışdırın...&#10;&#10;Nümunə format:&#10;{n:1, q:&quot;Sual mətni?&quot;, opts:[&quot;A) Cavab&quot;,&quot;B) Cavab&quot;], ans:&quot;A&quot;},"></textarea>
    <div class="paste-btns">
      <button class="btn-ok" id="paste-ok">Yüklə</button>
      <button id="paste-cancel">Ləğv et</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
const DEMO = `{n:1, q:"5-ci sinif Fiziki tərbiyə metodiki vəsaiti neçə bölmədən ibarətdir?", opts:["A) 5","B) 9","C) 7","D) 8","E) 6"], ans:"C"},
{n:2, q:"5-ci sinif Fiziki tərbiyə dərsliyi neçə tədris vahidindən ibarətdir?", opts:["A) 7","B) 5","C) 8","D) 6","E) 4"], ans:"D"},
{n:3, q:"Dərslikdə birinci tədris vahidinin mövzusu hansıdır?", opts:["A) Qüvvə hərəki qabiliyyəti","B) Dözümlülük hərəki qabiliyyəti","C) Çeviklik hərəki qabiliyyəti","D) Bədənin əyilmə qabiliyyəti","E) Sürət hərəki qabiliyyəti"], ans:"E"},
{n:4, q:"Fiziki tərbiyə fənn kurikulumu neçə məzmun xəttindən ibarətdir?", opts:["A) 2","B) 3","C) 5","D) 4","E) 6"], ans:"D"}`;

let questions = [];
let removed = new Set();

function parseQuestions(text) {
  const results = [];
  const re = /\{n\s*:\s*(\d+)\s*,\s*q\s*:\s*"((?:[^"\\]|\\.)*)"\s*,\s*opts\s*:\s*\[(.*?)\]\s*,\s*ans\s*:\s*"([^"]+)"\s*\}/gs;
  let m;
  while ((m = re.exec(text)) !== null) {
    const opts = [];
    const optsRaw = m[3];
    const optRe = /"((?:[^"\\]|\\.)*)"/g;
    let om;
    while ((om = optRe.exec(optsRaw)) !== null) opts.push(om[1]);
    results.push({ n: parseInt(m[1]), q: m[2], opts, ans: m[4] });
  }
  return results;
}

function updateStats() {
  const total = questions.length;
  const kept = total - removed.size;
  document.getElementById('stats').textContent = total > 0 ? `${kept} aktiv / ${total} sual` : '';
  document.getElementById('remove-all-btn').style.display = total > 0 ? '' : 'none';
  document.getElementById('restore-all-btn').style.display = removed.size > 0 ? '' : 'none';
}

function render() {
  const content = document.getElementById('content');
  if (questions.length === 0) {
    content.innerHTML = '<div class="empty">Sual yüklənməyib.<br>Fayl seçin, mətn yapışdırın və ya nümunəni yükləyin.</div>';
    updateStats();
    return;
  }

  let html = '<div class="question-list">';
  questions.forEach(q => {
    const rem = removed.has(q.n);
    html += `<div class="q-card${rem ? ' removed' : ''}" id="qcard-${q.n}">
      <div class="num">#${q.n}</div>
      <div class="body">
        <div class="qtext">${escHtml(q.q)}</div>
        <div class="opts">`;
    q.opts.forEach(o => {
      const letter = o.split(')')[0].trim();
      const isCorrect = letter === q.ans;
      html += `<span class="opt-badge${isCorrect ? ' correct' : ''}">${escHtml(o)}</span>`;
    });
    html += `</div>
        <div class="ans-label">Düzgün cavab: <b>${escHtml(q.ans)}</b></div>
      </div>
      <button class="remove-btn${rem ? ' restore' : ''}" onclick="toggleRemove(${q.n})">${rem ? '♻️ Bərpa et' : '🗑 Sil'}</button>
    </div>`;
  });
  html += '</div>';

  const kept = questions.length - removed.size;
  html += `<div class="export-bar">
    <span>${removed.size > 0 ? removed.size + ' sual silinib, ' + kept + ' sual qalır' : 'Bütün ' + questions.length + ' sual aktivdir'}</span>
    <button class="btn-export" onclick="exportTxt()">⬇ TXT ixrac et</button>
  </div>`;

  content.innerHTML = html;
  updateStats();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleRemove(n) {
  if (removed.has(n)) removed.delete(n);
  else removed.add(n);
  render();
}

function exportTxt() {
  const kept = questions.filter(q => !removed.has(q.n));
  if (kept.length === 0) { alert('İxrac etmək üçün aktiv sual yoxdur.'); return; }
  let out = '';
  kept.forEach((q, i) => {
    const optsStr = q.opts.map(o => `"${o}"`).join(',');
    out += `{n:${i+1}, q:"${q.q}", opts:[${optsStr}], ans:"${q.ans}"},\n`;
  });
  const blob = new Blob([out], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'suallar_redakte.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function loadText(text) {
  const parsed = parseQuestions(text);
  if (parsed.length === 0) {
    alert('Heç bir sual tapılmadı.\n\nFormatı yoxlayın:\n{n:1, q:"Sual?", opts:["A) ...", "B) ..."], ans:"A"},');
    return;
  }
  questions = parsed;
  removed = new Set();
  render();
}

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadText(ev.target.result);
  reader.readAsText(file, 'utf-8');
  this.value = '';
});

document.getElementById('demo-btn').addEventListener('click', () => loadText(DEMO));

document.getElementById('paste-btn').addEventListener('click', () => {
  const area = document.getElementById('paste-area');
  area.style.display = area.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('paste-cancel').addEventListener('click', () => {
  document.getElementById('paste-area').style.display = 'none';
  document.getElementById('paste-input').value = '';
});

document.getElementById('paste-ok').addEventListener('click', () => {
  const text = document.getElementById('paste-input').value.trim();
  if (!text) { alert('Mətn boşdur.'); return; }
  loadText(text);
  document.getElementById('paste-area').style.display = 'none';
  document.getElementById('paste-input').value = '';
});

document.getElementById('remove-all-btn').addEventListener('click', () => {
  questions.forEach(q => removed.add(q.n));
  render();
});

document.getElementById('restore-all-btn').addEventListener('click', () => {
  removed.clear();
  render();
});

render();
</script>
</body>
</html>
